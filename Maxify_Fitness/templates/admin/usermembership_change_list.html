{% extends "admin/change_list.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-4">
        <a href="{% url 'admin:authapp_usermembership_changelist' %}" style="text-decoration:none;">
            <div class="card p-3 text-white" style="background-color:#28a745;">
                <h5>Total Revenue</h5>
                <h3>₦{{ total_revenue }}</h3>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="{% url 'admin:authapp_usermembership_changelist' %}?is_active__exact=1" style="text-decoration:none;">
            <div class="card p-3 text-white" style="background-color:#007bff;">
                <h5>Active Members</h5>
                <h3>{{ active_members }}</h3>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="{% url 'admin:authapp_usermembership_changelist' %}?expiry_date__lte={{ 7|date:'Y-m-d' }}" style="text-decoration:none;">
            <div class="card p-3 text-white" style="background-color:#ffc107;">
                <h5>Expiring Soon (7 days)</h5>
                <h3>{{ expiring_soon }}</h3>
            </div>
        </a>
    </div>
</div>

{{ block.super }}
{% endblock %}
