{% extends 'base.html' %}
{% block title %} Confirm_Password {% endblock title%}

{% block header %}

<h2 class="text-warning">Set New Password</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <br>

    <button type="submit" style="background-color:rgb(255, 196, 0);">
        Change Password
    </button>
</form>

{% endblock header %}
