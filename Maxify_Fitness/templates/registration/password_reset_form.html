{% extends 'base.html' %}
{% block title %} Reset_Password {% endblock title%}

{% block header %}

<h2 class="text-warning">Reset Your Password</h2>
<br />
<br />

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <br><br>
    <button type="submit" style="background-color: rgb(255, 196, 0);">
        Send Reset Link
    </button>
</form>

{% endblock header %}
